<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCSE Revision Planner</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        /* Enhanced Theme System - Root Variables */
        :root {
            /* Yellow Theme */
            --bg-primary: linear-gradient(135deg, #fef9c3 0%, #fef3c7 25%, #fde68a 50%, #f59e0b 75%, #d97706 100%);
            --bg-secondary: #fef3c7;
            --bg-card: rgba(254, 249, 195, 0.98);
            --bg-card-hover: rgba(254, 249, 195, 1);
            --text-primary: #111827;
            --text-secondary: #374151;
            --text-muted: #6b7280;
            --accent-primary: #f59e0b;
            --accent-primary-hover: #d97706;
            --accent-primary-light: rgba(245, 158, 11, 0.08);
            --accent-green: #059669;
            --accent-red: #dc2626;
            --border-color: rgba(217, 119, 6, 0.3);
            --border-hover: rgba(245, 158, 11, 0.3);
            --glass-bg: rgba(254, 249, 195, 0.95);
            --glass-border: rgba(217, 119, 6, 0.3);
            --sidebar-bg: rgba(254, 249, 195, 0.99);
            --sidebar-highlight: linear-gradient(135deg, rgba(245, 158, 11, 0.12) 0%, rgba(245, 158, 11, 0.04) 100%);
            --calendar-header: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            --calendar-day: #fef9c3;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        /* Black Theme */
        [data-theme="black"] {
            --bg-primary: linear-gradient(135deg, #0f172a 0%, #1e293b 25%, #334155 50%, #475569 75%, #64748b 100%);
            --bg-secondary: #1e293b;
            --bg-card: rgba(30, 41, 59, 0.95);
            --bg-card-hover: rgba(30, 41, 59, 0.98);
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --accent-primary: #f59e0b;
            --accent-primary-hover: #d97706;
            --accent-primary-light: rgba(245, 158, 11, 0.15);
            --accent-green: #34d399;
            --accent-red: #f87171;
            --border-color: rgba(71, 85, 105, 0.3);
            --border-hover: rgba(245, 158, 11, 0.4);
            --glass-bg: rgba(30, 41, 59, 0.9);
            --glass-border: rgba(71, 85, 105, 0.4);
            --sidebar-bg: rgba(15, 23, 42, 0.98);
            --sidebar-highlight: linear-gradient(135deg, rgba(245, 158, 11, 0.2) 0%, rgba(245, 158, 11, 0.08) 100%);
            --calendar-header: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            --calendar-day: #334155;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4), 0 2px 4px -1px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.4);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.6), 0 10px 10px -5px rgba(0, 0, 0, 0.5);
        }

        /* Smooth theme transitions */
        * {
            transition: background-color 0.6s cubic-bezier(0.4, 0, 0.2, 1),
                        color 0.6s cubic-bezier(0.4, 0, 0.2, 1),
                        border-color 0.6s cubic-bezier(0.4, 0, 0.2, 1),
                        box-shadow 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            font-weight: 400;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--gradient-overlay);
            backdrop-filter: blur(0.5px);
            z-index: -1;
        }

        /* Container and Layout */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
            transition: margin-left 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 50px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 2px solid var(--glass-border);
            box-shadow: var(--shadow-lg);
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .container.sidebar-open {
            margin-left: 280px;
        }

        /* Button Styles */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 500;
            font-size: 16px;
            cursor: pointer;
            border: 2px solid var(--border-color);
            background-color: var(--accent-primary);
            color: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-sm);
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            background-color: var(--accent-primary-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--border-hover);
        }

        .btn:active {
            transform: translateY(0);
            box-shadow: var(--shadow-sm);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: var(--shadow-sm);
        }

        .btn-icon {
            margin-right: 8px;
        }

        .btn-primary {
            background-color: var(--accent-primary);
            border-color: var(--accent-primary);
        }

        .btn-primary:hover {
            background-color: var(--accent-primary-hover);
            border-color: var(--accent-primary-hover);
        }

        .btn-secondary {
            background-color: var(--bg-card);
            color: var(--text-primary);
            border-color: var(--border-color);
        }

        .btn-secondary:hover {
            background-color: var(--bg-card-hover);
            border-color: var(--border-hover);
        }

        .btn-success {
            background-color: var(--accent-green);
            border-color: var(--accent-green);
        }

        .btn-success:hover {
            background-color: color-mix(in srgb, var(--accent-green), black 15%);
            border-color: color-mix(in srgb, var(--accent-green), black 15%);
        }

        .btn-danger {
            background-color: var(--accent-red);
            border-color: var(--accent-red);
        }

        .btn-danger:hover {
            background-color: color-mix(in srgb, var(--accent-red), black 15%);
            border-color: color-mix(in srgb, var(--accent-red), black 15%);
        }

        .btn-outline {
            background-color: transparent;
            color: var(--accent-primary);
            border-color: var(--accent-primary);
        }

        .btn-outline:hover {
            background-color: var(--accent-primary-light);
            color: var(--accent-primary-hover);
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 14px;
        }

        .btn-large {
            padding: 16px 32px;
            font-size: 18px;
        }

        /* Rest of the existing file continues exactly as before... */
        /* ... (keeping all other existing styles and functionality) */
